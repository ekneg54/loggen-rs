# loggen example: Credential stuffing attack pattern
# Simulates distributed credential stuffing attempts from rotating IPs.
# Uses single_event with varied user:pass combos and 401/403 with occasional 200.
# Usage: cargo run -- generate --config=examples/attack-credential-stuffing.yaml
output:
  target: stdout

count: 80
log_level: INFO

attacks:
  - name: credential-stuffing
    type: single_event
    template: '{{ ipv4 }} - {{ user }} [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "POST /auth HTTP/1.1" {{ status }} {{ port }} "-" "{{ user_agent }}"'
    count: 80
    interleave: false
    vars:
      status:
        values: ["401", "401", "403", "401", "200"]
        mode: weighted
      user:
        values: ["admin", "root", "test", "user", "guest", "admin", "support", "nobody"]
        mode: cycle
