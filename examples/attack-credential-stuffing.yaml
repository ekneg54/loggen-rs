# loggen example: Credential stuffing attack pattern
#
# Simulates distributed credential stuffing attempts from rotating IPs with
# varied username:password combinations. Uses common field freezing to keep
# ipv4 and port static within the attack run (simulating a single bot).
#
# Attack type: single_event — each entry is independently rendered.
#
# common field: List of template variables to freeze after the first entry.
# Values for these variables are computed once (first entry) and reused for
# all subsequent entries in the attack, creating a consistent "attacker identity".
#
# Var mode "cycle": iterates through values sequentially, wrapping around.
# Here it cycles through usernames for each request.
#
# Usage: cargo run -- generate --config=examples/attack-credential-stuffing.yaml
#
# See also:
#   attack-brute-force.yaml — single_event brute force (no common fields)
#   attack-port-scan.yaml   — multi_ordered port scan
#   attack-ddos.yaml        — threshold_field with biased status
#   attack-sqli-probe.yaml  — multi_ordered SQL injection probe

output:
  target: stdout

count: 80
log_level: INFO

attacks:
  - name: credential-stuffing
    type: single_event
    template: '{{ ipv4 }} - {{ user }} [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "POST /auth HTTP/1.1" {{ status }} {{ port }} "-" "{{ user_agent }}"'
    count: 80
    interleave: false
    common:
      - ipv4
      - port
    vars:
      status:
        values: ["401", "401", "403", "401", "200"]
        mode: weighted
      user:
        values: ["admin", "root", "test", "user", "guest", "admin", "support", "nobody"]
        mode: cycle
