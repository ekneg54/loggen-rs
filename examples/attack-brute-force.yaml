# loggen example: Brute-force login attack pattern
# Simulates repeated POST /login attempts from a fixed IP with mostly 401 responses
# and occasional 200 (successful breach).
# Usage: cargo run -- generate --config=examples/attack-brute-force.yaml
output:
  target: stdout

count: 50
log_level: INFO

attacks:
  - name: brute-force
    type: single_event
    # Apache combined log format with brute-force characteristics
    template: '{{ ipv4 }} - - [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "POST /login HTTP/1.1" {{ status }} {{ port }} "-" "{{ user_agent }}"'
    count: 50
    interleave: true
    vars:
      # Mostly 401, occasional 200 to simulate successful breach
      status:
        values: ["401", "401", "401", "401", "200"]
        mode: weighted
      # Single fixed IP (attacker)
      ipv4:
        values: ["192.168.1.100"]
        mode: cycle
