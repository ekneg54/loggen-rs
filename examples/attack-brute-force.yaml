# loggen example: Brute-force login attack pattern
#
# Simulates repeated POST /login attempts from a fixed IP with mostly 401
# responses and occasional 200 (successful breach). Uses single_event with
# attack var overrides for weighted status distribution and fixed attacker IP.
#
# Attack type: single_event — each entry is independently rendered using the
# same template. Per-attack vars override global template_vars and random defaults.
#
# Var mode reference:
#   "random"   (default): chooses a random value from the pool each entry
#   "cycle":   iterates through values sequentially, wrapping around
#   "weighted": first values have higher probability (decaying weights)
#
# Usage: cargo run -- generate --config=examples/attack-brute-force.yaml
#
# See also:
#   attack-port-scan.yaml      — multi_ordered sequential port scan
#   attack-ddos.yaml           — threshold_field for biased status distribution
#   attack-sqli-probe.yaml     — multi_ordered SQL injection probe sequence
#   attack-credential-stuffing.yaml — single_event with common field freezing

output:
  target: stdout

count: 50
log_level: INFO

attacks:
  - name: brute-force
    type: single_event
    # Apache combined log format with brute-force characteristics
    template: '{{ ipv4 }} - - [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "POST /login HTTP/1.1" {{ status }} {{ port }} "-" "{{ user_agent }}"'
    count: 50
    interleave: true
    vars:
      # Mostly 401, occasional 200 to simulate successful breach
      status:
        values: ["401", "401", "401", "401", "200"]
        mode: weighted
      # Single fixed IP (attacker)
      ipv4:
        values: ["192.168.1.100"]
        mode: cycle
