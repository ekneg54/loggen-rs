# loggen example: DDoS ramp-up attack pattern
#
# Simulates a DDoS attack with rotating source IPs and biased status codes.
# Uses threshold_field to drive 70% of entries toward 5xx server errors,
# mimicking a server under load.
#
# Attack type: threshold_field — renders each entry via template and uses
# rejection sampling on the specified field to achieve the target proportion
# of values in the desired bucket [min, max].
#
# Threshold reference:
#   field:      Template variable to threshold on (here: status)
#   min:        Inclusive lower bound for the bucket
#   max:        Optional inclusive upper bound
#   proportion: Target proportion of entries in bucket (0.0–1.0, default: 0.5)
#
# Usage: cargo run -- generate --config=examples/attack-ddos.yaml
#
# See also:
#   attack-brute-force.yaml         — single_event brute force
#   attack-port-scan.yaml           — multi_ordered port scan
#   attack-sqli-probe.yaml          — multi_ordered SQL injection probe
#   attack-credential-stuffing.yaml — single_event with common field freezing

output:
  target: stdout

count: 100
log_level: INFO

attacks:
  - name: ddos
    type: threshold_field
    template: '{{ ipv4 }} - - [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "GET /index.html HTTP/1.1" {{ status }} {{ port }} "-" "{{ user_agent }}"'
    count: 100
    interleave: false
    threshold:
      field: status
      min: 500
      proportion: 0.7
