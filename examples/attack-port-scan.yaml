# loggen example: Port scan attack pattern
#
# Simulates a sequential port scan using CONNECT probes from a single IP
# with nmap User-Agent. Uses multi_ordered to ensure ports are scanned in
# the correct sequence (22, 80, 443, 8080, 3306).
#
# Attack type: multi_ordered — renders templates from sequence[] in order.
# Supports repeat: "loop" (wrap around) or "once" (stop after sequence exhausted).
#
# Var mode reference:
#   "cycle" (used for ipv4): iterates through values sequentially.
#   "random": uniform random selection from pool.
#   "weighted": first values have higher probability.
#
# Usage: cargo run -- generate --config=examples/attack-port-scan.yaml
#
# See also:
#   attack-brute-force.yaml         — single_event brute force
#   attack-ddos.yaml                — threshold_field with biased status
#   attack-sqli-probe.yaml          — multi_ordered SQL injection probe
#   attack-credential-stuffing.yaml — single_event with common field freezing

output:
  target: stdout

count: 100
log_level: INFO

attacks:
  - name: port-scan
    type: multi_ordered
    sequence:
      - '{{ ipv4 }} - - [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "CONNECT 10.0.0.1:22 HTTP/1.1" 200 0 "-" "nmap/7.80"'
      - '{{ ipv4 }} - - [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "CONNECT 10.0.0.1:80 HTTP/1.1" 200 0 "-" "nmap/7.80"'
      - '{{ ipv4 }} - - [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "CONNECT 10.0.0.1:443 HTTP/1.1" 200 0 "-" "nmap/7.80"'
      - '{{ ipv4 }} - - [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "CONNECT 10.0.0.1:8080 HTTP/1.1" 200 0 "-" "nmap/7.80"'
      - '{{ ipv4 }} - - [{{ timestamp | date(format="%d/%b/%Y:%H:%M:%S %z") }}] "CONNECT 10.0.0.1:3306 HTTP/1.1" 200 0 "-" "nmap/7.80"'
    count: 100
    repeat: loop
    interleave: false
    vars:
      # Fixed attacker IP
      ipv4:
        values: ["10.0.0.5"]
        mode: cycle
